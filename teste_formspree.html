<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Formspree - Shield Security</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f4f4f4;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: #00ff88;
            color: #000;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #00cc66;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h1>Teste Formspree - Shield Security</h1>
    <p>Este formulário envia diretamente para o email: sites.personalizados.lcsp@gmail.com</p>
    
    <div id="status" class="status"></div>
    
    <form action="https://formspree.io/f/mrbpzydj" method="POST" id="testForm">
        <div class="form-group">
            <label for="nome">Nome Completo *</label>
            <input type="text" id="nome" name="nome" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="telefone">Telefone *</label>
            <input type="tel" id="telefone" name="telefone" required>
        </div>
        
        <div class="form-group">
            <label for="mensagem">Mensagem *</label>
            <textarea id="mensagem" name="mensagem" rows="4" required placeholder="Teste de envio de formulário..."></textarea>
        </div>
        
        <button type="submit">Enviar Teste</button>
    </form>

    <script>
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const statusDiv = document.getElementById('status');
            const submitBtn = document.querySelector('button[type="submit"]');
            
            // Mostrar loading
            statusDiv.className = 'status';
            statusDiv.style.display = 'block';
            statusDiv.textContent = 'Enviando...';
            statusDiv.className = 'status';
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';
            
            // Enviar formulário
            const formData = new FormData(this);
            
            fetch(this.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) {
                    return response.json();
                }
                throw new Error('Erro na resposta');
            })
            .then(data => {
                statusDiv.className = 'status success';
                statusDiv.textContent = '✅ Mensagem enviada com sucesso! Verifique seu email.';
                this.reset();
            })
            .catch(error => {
                console.error('Erro:', error);
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Erro ao enviar. Tente novamente.';
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar Teste';
            });
        });
    </script>
</body>
</html>
